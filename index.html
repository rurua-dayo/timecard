<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>出勤タイムカード</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="card">
    <h1>出勤タイムカード</h1>

    <label class="label" for="name">名前</label>
    <input id="name" class="input" type="text" placeholder="例：手塚" autocomplete="name">

    <div class="buttons">
      <button id="clockIn" class="button primary" type="button">出勤</button>
      <button id="clockOut" class="button secondary" type="button">退勤</button>
    </div>

    <p id="message" class="message" aria-live="polite"></p>
  </main>

  <script src="./app.js"></script>
</body>
</html>
