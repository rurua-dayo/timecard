<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>出勤タイムカード</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="page">
    <section class="panel">
      <h1>出勤タイムカード</h1>
      <p class="hint">名前を選んで、打刻してください。勤務表はスプレッドシートに自動反映されます。</p>

      <div class="employee-grid" id="employeeButtons"></div>

      <div class="selected-box">
        <span>選択中</span>
        <strong id="selectedEmployee">未選択</strong>
      </div>

      <div class="punch-grid">
        <button type="button" data-action="出勤">出勤</button>
        <button type="button" data-action="退勤">退勤</button>
        <button type="button" data-action="中退">中退</button>
        <button type="button" data-action="祝日">祝日</button>
        <button type="button" data-action="有給">有給</button>
      </div>

      <div class="pdf-area">
        <button type="button" id="pdfButton" class="pdf-button">PDF出力</button>
        <p class="small">選択中の人の今月分シートをPDFにします。</p>
      </div>

      <p id="message" class="message" aria-live="polite"></p>

      <div id="pdfLinkArea" class="pdf-link-area"></div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
